<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Lorenz Attractor Particle Sim</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0f;
      overflow: hidden;
      font-family: 'Courier New', monospace;
      color: #e0e0e0;
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      display: block;
    }

    /* ── toggle button ── */
    #toggle-btn {
      position: fixed;
      top: 14px;
      right: 14px;
      z-index: 200;
      background: rgba(10,10,20,0.85);
      border: 1px solid #3a5a6a;
      color: #7af0ff;
      font-family: inherit;
      font-size: 11px;
      letter-spacing: 1px;
      padding: 6px 12px;
      cursor: pointer;
      border-radius: 3px;
      transition: background 0.15s, border-color 0.15s;
    }
    #toggle-btn:hover { background: rgba(122,240,255,0.12); border-color: #7af0ff; }

    /* ── side panel ── */
    #panel {
      position: fixed;
      top: 0;
      right: 0;
      width: 270px;
      height: 100vh;
      z-index: 100;
      background: rgba(8, 10, 18, 0.96);
      border-left: 1px solid #1e2a3a;
      padding: 16px 16px 24px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 18px;
      transition: transform 0.25s ease;
    }
    #panel.hidden { transform: translateX(100%); }

    /* ── hints overlay ── */
    #hints {
      position: fixed;
      bottom: 16px;
      left: 16px;
      z-index: 50;
      font-size: 10px;
      color: #2a4a5a;
      line-height: 2;
      pointer-events: none;
    }
    #hints span { color: #3a6a7a; }

    h1 {
      font-size: 12px;
      font-weight: normal;
      color: #7af0ff;
      letter-spacing: 2px;
      text-transform: uppercase;
      border-bottom: 1px solid #1e2a3a;
      padding-bottom: 10px;
      margin-top: 36px;
    }

    .section-title {
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #4a6a7a;
      margin-bottom: 8px;
    }

    .control {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .control label {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: #90b0c0;
    }

    .control label span {
      color: #7af0ff;
      min-width: 44px;
      text-align: right;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 3px;
      background: #1e2a3a;
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 13px;
      height: 13px;
      border-radius: 50%;
      background: #7af0ff;
      cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb:hover { background: #b0f8ff; }

    .section { display: flex; flex-direction: column; gap: 10px; }

    .btn-row { display: flex; gap: 8px; }

    button.action {
      flex: 1;
      padding: 8px 4px;
      background: transparent;
      border: 1px solid #2a3a4a;
      color: #7af0ff;
      font-family: inherit;
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 2px;
      transition: background 0.15s, border-color 0.15s;
    }
    button.action:hover { background: rgba(122,240,255,0.1); border-color: #7af0ff; }
    button.action:active { background: rgba(122,240,255,0.22); }

    .color-row { display: flex; gap: 7px; flex-wrap: wrap; }
    .color-swatch {
      width: 24px; height: 24px; border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.15s, transform 0.1s;
    }
    .color-swatch:hover { transform: scale(1.15); }
    .color-swatch.active { border-color: #fff; }

    .stats {
      font-size: 10px;
      color: #3a5a6a;
      line-height: 2;
      border-top: 1px solid #1a2a34;
      padding-top: 10px;
    }
    .stats span { color: #5a9aaa; }
  </style>
</head>
<body>

<canvas id="c"></canvas>

<button id="toggle-btn">⚙ Controls</button>

<div id="hints">
  Drag to rotate &nbsp;·&nbsp; Scroll to zoom<br>
  <span>Arrow keys</span> rotate &nbsp;·&nbsp; <span>+/-</span> zoom
</div>

<div id="panel">
  <h1>Lorenz Attractor</h1>

  <!-- Lorenz params -->
  <div>
    <div class="section-title">Lorenz Parameters</div>
    <div class="section">
      <div class="control">
        <label>σ sigma <span id="v-sigma">10.0</span></label>
        <input type="range" id="s-sigma" min="1" max="30" step="0.1" value="10">
      </div>
      <div class="control">
        <label>ρ rho <span id="v-rho">28.0</span></label>
        <input type="range" id="s-rho" min="1" max="60" step="0.1" value="28">
      </div>
      <div class="control">
        <label>β beta <span id="v-beta">2.667</span></label>
        <input type="range" id="s-beta" min="0.1" max="10" step="0.01" value="2.667">
      </div>
    </div>
  </div>

  <!-- Simulation -->
  <div>
    <div class="section-title">Simulation</div>
    <div class="section">
      <div class="control">
        <label>Particles <span id="v-count">300</span></label>
        <input type="range" id="s-count" min="50" max="5000" step="50" value="300">
      </div>
      <div class="control">
        <label>Speed <span id="v-speed">1.00</span></label>
        <input type="range" id="s-speed" min="0.1" max="4" step="0.05" value="1.0">
      </div>
      <div class="control">
        <label>Tail length <span id="v-tail">50</span></label>
        <input type="range" id="s-tail" min="1" max="200" step="1" value="50">
      </div>
      <div class="control">
        <label>Trail alpha <span id="v-fade">0.45</span></label>
        <input type="range" id="s-fade" min="0.05" max="1.0" step="0.01" value="0.45">
      </div>
    </div>
  </div>

  <!-- Appearance -->
  <div>
    <div class="section-title">Appearance</div>
    <div class="section">
      <div class="control">
        <label>Particle size <span id="v-size">1.5</span></label>
        <input type="range" id="s-size" min="0.5" max="5" step="0.1" value="1.5">
      </div>
      <div class="control">
        <label>Brightness <span id="v-bright">0.80</span></label>
        <input type="range" id="s-bright" min="0.1" max="2" step="0.05" value="0.8">
      </div>
      <div>
        <div class="section-title" style="margin-bottom:8px">Color theme</div>
        <div class="color-row" id="color-row"></div>
      </div>
    </div>
  </div>

  <!-- View -->
  <div>
    <div class="section-title">Camera</div>
    <div class="section">
      <div class="control">
        <label>Rotate X <span id="v-rx">0.30</span></label>
        <input type="range" id="s-rx" min="-1.57" max="1.57" step="0.01" value="0.3">
      </div>
      <div class="control">
        <label>Rotate Y <span id="v-ry">0.00</span></label>
        <input type="range" id="s-ry" min="-3.14" max="3.14" step="0.01" value="0.0">
      </div>
      <div class="control">
        <label>Zoom <span id="v-zoom">8.0</span></label>
        <input type="range" id="s-zoom" min="2" max="30" step="0.5" value="8">
      </div>
    </div>
  </div>

  <div class="btn-row">
    <button class="action" id="btn-pause">Pause</button>
    <button class="action" id="btn-reset">Reset</button>
  </div>
  <div class="btn-row">
    <button class="action" id="btn-explode">Explode</button>
  </div>

  <div class="stats" id="stats"></div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// ── params ───────────────────────────────────────────────────────────────────

const P = {
  sigma: 10, rho: 28, beta: 8/3,
  count: 300, speed: 1.0,
  tail: 50, fade: 0.45,
  size: 1.5, bright: 0.8,
  rotX: 0.3, rotY: 0.0, zoom: 8,
};

const COLOR_THEMES = [
  { fn: t => `hsl(${190+t*60},100%,65%)` },   // cyan
  { fn: t => `hsl(${t*60},100%,55%)` },        // fire
  { fn: t => `hsl(${260+t*80},80%,65%)` },     // purple
  { fn: t => `hsl(${100+t*40},90%,55%)` },     // green
  { fn: t => `hsl(0,0%,${55+t*40}%)` },        // white
  { fn: t => `hsl(${t*360},90%,60%)` },        // rainbow
];
const SWATCH_HEX = ['#7af0ff','#ff7a20','#b07aff','#7aff8a','#cccccc','#ff7af0'];
let colorTheme = 0;

let particles = [];
let paused = false;
let fps = 0, fpsFrames = 0, lastFpsTime = performance.now();

// ── particles ────────────────────────────────────────────────────────────────

const rand = (a,b) => a + Math.random()*(b-a);

function makeParticle() {
  return { x: rand(-20,20), y: rand(-20,20), z: rand(0,40), history: [] };
}

function initParticles() {
  particles = Array.from({length: P.count}, makeParticle);
}

// ── lorenz RK4 ───────────────────────────────────────────────────────────────

const BASE_DT = 0.005;

function deriv(x,y,z) {
  return [P.sigma*(y-x), x*(P.rho-z)-y, x*y-P.beta*z];
}

function stepRK4(p) {
  const steps = Math.max(1, Math.round(P.speed * 2));
  const dt = BASE_DT * P.speed / steps;
  for (let i = 0; i < steps; i++) {
    const [k1x,k1y,k1z] = deriv(p.x,p.y,p.z);
    const [k2x,k2y,k2z] = deriv(p.x+dt/2*k1x, p.y+dt/2*k1y, p.z+dt/2*k1z);
    const [k3x,k3y,k3z] = deriv(p.x+dt/2*k2x, p.y+dt/2*k2y, p.z+dt/2*k2z);
    const [k4x,k4y,k4z] = deriv(p.x+dt*k3x,   p.y+dt*k3y,   p.z+dt*k3z);
    p.x += dt/6*(k1x+2*k2x+2*k3x+k4x);
    p.y += dt/6*(k1y+2*k2y+2*k3y+k4y);
    p.z += dt/6*(k1z+2*k2z+2*k3z+k4z);
  }
}

// ── projection ───────────────────────────────────────────────────────────────

function project(x, y, z) {
  const cx=Math.cos(P.rotX), sx=Math.sin(P.rotX);
  const cy=Math.cos(P.rotY), sy=Math.sin(P.rotY);
  const y1 = y*cx - z*sx;
  const z1 = y*sx + z*cx;
  const x2 = x*cy + z1*sy;
  return [
    canvas.width/2  + x2 * P.zoom,
    canvas.height/2 - y1 * P.zoom,
  ];
}

// ── color ────────────────────────────────────────────────────────────────────

function color(z, alpha) {
  const t = Math.max(0, Math.min(1, z/50));
  const base = COLOR_THEMES[colorTheme].fn(t);
  return base.replace('hsl(','hsla(').replace(')',`,${(alpha*P.bright).toFixed(3)})`);
}

// ── render ───────────────────────────────────────────────────────────────────

function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}

function draw() {
  // Full clear every frame so trail history is always re-projected from 3D.
  // This means camera movement never causes screen-space smearing.
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  for (const p of particles) {
    const hist = p.history;
    const len = hist.length;

    // Trail: older segments are more transparent
    if (len > 1) {
      ctx.lineWidth = P.size * 0.55;
      for (let i = 1; i < len; i++) {
        const alpha = (i / len) * P.fade;
        const [x0,y0] = project(hist[i-1].x, hist[i-1].y, hist[i-1].z);
        const [x1,y1] = project(hist[i].x,   hist[i].y,   hist[i].z);
        ctx.strokeStyle = color(hist[i].z, alpha);
        ctx.beginPath(); ctx.moveTo(x0,y0); ctx.lineTo(x1,y1); ctx.stroke();
      }
    }

    // Particle head
    const [sx,sy] = project(p.x, p.y, p.z);
    ctx.fillStyle = color(p.z, 0.95);
    ctx.beginPath(); ctx.arc(sx, sy, P.size, 0, Math.PI*2); ctx.fill();
  }
}

// ── main loop ────────────────────────────────────────────────────────────────

function tick() {
  if (!paused) {
    const tail = Math.round(P.tail);
    for (const p of particles) {
      p.history.push({x:p.x, y:p.y, z:p.z});
      if (p.history.length > tail) p.history.shift();
      stepRK4(p);
    }
    fpsFrames++;
  }
  draw();

  const now = performance.now();
  if (now - lastFpsTime > 600) {
    fps = Math.round(fpsFrames * 1000 / (now - lastFpsTime));
    fpsFrames = 0;
    lastFpsTime = now;
    document.getElementById('stats').innerHTML =
      `FPS <span>${fps}</span><br>` +
      `Particles <span>${particles.length}</span><br>` +
      `σ <span>${P.sigma.toFixed(1)}</span> &nbsp;` +
      `ρ <span>${P.rho.toFixed(1)}</span> &nbsp;` +
      `β <span>${P.beta.toFixed(3)}</span>`;
  }
  requestAnimationFrame(tick);
}

// ── slider helper ────────────────────────────────────────────────────────────

function bindSlider(sliderId, key, valId, fmt) {
  const sl = document.getElementById(sliderId);
  const vl = document.getElementById(valId);
  const update = v => { P[key] = v; vl.textContent = fmt(v); };
  sl.addEventListener('input', () => update(parseFloat(sl.value)));
  // expose so camera controls can sync
  sl._syncDisplay = () => { vl.textContent = fmt(P[key]); sl.value = P[key]; };
}

bindSlider('s-sigma','sigma','v-sigma', v=>v.toFixed(1));
bindSlider('s-rho',  'rho',  'v-rho',  v=>v.toFixed(1));
bindSlider('s-beta', 'beta', 'v-beta', v=>v.toFixed(3));
bindSlider('s-speed','speed','v-speed',v=>v.toFixed(2));
bindSlider('s-tail', 'tail', 'v-tail', v=>Math.round(v));
bindSlider('s-fade', 'fade', 'v-fade', v=>v.toFixed(2));
bindSlider('s-size', 'size', 'v-size', v=>v.toFixed(1));
bindSlider('s-bright','bright','v-bright',v=>v.toFixed(2));
bindSlider('s-rx',   'rotX', 'v-rx',   v=>v.toFixed(2));
bindSlider('s-ry',   'rotY', 'v-ry',   v=>v.toFixed(2));
bindSlider('s-zoom', 'zoom', 'v-zoom', v=>v.toFixed(1));

document.getElementById('s-count').addEventListener('input', function() {
  const v = parseInt(this.value);
  P.count = v;
  document.getElementById('v-count').textContent = v;
  while (particles.length < v) particles.push(makeParticle());
  while (particles.length > v) particles.pop();
});

// ── sync camera sliders from code ────────────────────────────────────────────

function syncCamera() {
  P.rotX = Math.max(-1.57, Math.min(1.57, P.rotX));
  document.getElementById('s-rx')._syncDisplay();
  document.getElementById('s-ry')._syncDisplay();
  document.getElementById('s-zoom')._syncDisplay();
}

// ── drag to rotate ───────────────────────────────────────────────────────────

let dragging = false, dragStart = {x:0,y:0}, rotStart = {x:0,y:0};

canvas.addEventListener('mousedown', e => {
  // don't steal clicks on the panel
  if (e.target !== canvas) return;
  dragging = true;
  canvas.style.cursor = 'grabbing';
  dragStart = {x:e.clientX, y:e.clientY};
  rotStart  = {x:P.rotX, y:P.rotY};
});
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  P.rotY = rotStart.y + (e.clientX - dragStart.x) * 0.006;
  P.rotX = rotStart.x + (e.clientY - dragStart.y) * 0.006;
  syncCamera();
});
window.addEventListener('mouseup', () => {
  dragging = false;
  canvas.style.cursor = 'grab';
});
canvas.style.cursor = 'grab';

// ── scroll to zoom ───────────────────────────────────────────────────────────

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  P.zoom = Math.max(2, Math.min(30, P.zoom - e.deltaY * 0.025));
  syncCamera();
}, { passive: false });

// ── arrow key camera ─────────────────────────────────────────────────────────

const keys = new Set();
window.addEventListener('keydown', e => keys.add(e.key));
window.addEventListener('keyup',   e => keys.delete(e.key));

function handleKeys() {
  const ROT_SPEED  = 0.02;
  const ZOOM_SPEED = 0.15;
  let changed = false;
  if (keys.has('ArrowLeft'))  { P.rotY -= ROT_SPEED;  changed = true; }
  if (keys.has('ArrowRight')) { P.rotY += ROT_SPEED;  changed = true; }
  if (keys.has('ArrowUp'))    { P.rotX -= ROT_SPEED;  changed = true; }
  if (keys.has('ArrowDown'))  { P.rotX += ROT_SPEED;  changed = true; }
  if (keys.has('+') || keys.has('=')) { P.zoom = Math.min(30, P.zoom + ZOOM_SPEED); changed = true; }
  if (keys.has('-'))          { P.zoom = Math.max(2,  P.zoom - ZOOM_SPEED); changed = true; }
  if (changed) syncCamera();
  requestAnimationFrame(handleKeys);
}
requestAnimationFrame(handleKeys);

// ── buttons ──────────────────────────────────────────────────────────────────

document.getElementById('btn-pause').addEventListener('click', function() {
  paused = !paused;
  this.textContent = paused ? 'Resume' : 'Pause';
});
document.getElementById('btn-reset').addEventListener('click', () => {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  initParticles();
});
document.getElementById('btn-explode').addEventListener('click', () => {
  for (const p of particles) {
    p.x += rand(-15,15); p.y += rand(-15,15); p.z += rand(-10,10);
    p.history = [];
  }
});

// ── panel toggle ─────────────────────────────────────────────────────────────

const panel = document.getElementById('panel');
document.getElementById('toggle-btn').addEventListener('click', () => {
  panel.classList.toggle('hidden');
});

// ── color swatches ───────────────────────────────────────────────────────────

const colorRow = document.getElementById('color-row');
SWATCH_HEX.forEach((hex, i) => {
  const d = document.createElement('div');
  d.className = 'color-swatch' + (i === 0 ? ' active' : '');
  d.style.background = hex;
  d.addEventListener('click', () => {
    colorRow.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
    d.classList.add('active');
    colorTheme = i;
  });
  colorRow.appendChild(d);
});

// ── init ─────────────────────────────────────────────────────────────────────

window.addEventListener('resize', resize);
resize();
initParticles();
tick();
</script>
</body>
</html>
